name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.12.0'

jobs:
  quality:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: molopilot
          POSTGRES_PASSWORD: molopilot
          POSTGRES_DB: molopilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U molopilot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://molopilot:molopilot@localhost:5432/molopilot?schema=public
      SHADOW_DATABASE_URL: postgresql://molopilot:molopilot@localhost:5432/molopilot_shadow?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      # NOTE: apps/api typecheck excluded until health/prisma modules land (Phase 1, Task 13/14).
      - name: Typecheck (web, db, shared)
        run: pnpm -r --filter "!@molopilot/api" typecheck

      - name: Create shadow database
        run: |
          PGPASSWORD=molopilot psql -h localhost -U molopilot -d molopilot \
            -c "CREATE DATABASE molopilot_shadow;"

      - name: Apply migrations
        run: pnpm --filter @molopilot/db exec prisma migrate deploy

      - name: Test
        run: pnpm test

  e2e:
    name: E2E · A11y (Playwright + axe)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @molopilot/web exec playwright install --with-deps chromium

      - name: Build web
        run: pnpm --filter @molopilot/web build

      - name: Run Playwright tests
        run: pnpm --filter @molopilot/web e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

  lighthouse:
    name: Lighthouse budgets
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @molopilot/web build

      - name: Start web server
        run: pnpm --filter @molopilot/web start &

      - name: Wait for server
        run: npx wait-on http://localhost:3010 --timeout 60000

      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.13.x autorun
